<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C&C Luxury</title>

<style>

{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
}

/ NAVBAR /

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.7);
z-index:100;
}

nav img{
height:45px;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
font-size:14px;
letter-spacing:2px;
}

/ HERO /

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.overlay h1{
font-size:70px;
letter-spacing:10px;
}

.overlay p{
margin-top:10px;
letter-spacing:3px;
}

/ PRODUCTS /

.products{
padding:120px 50px;
text-align:center;
}

.products h2{
letter-spacing:6px;
margin-bottom:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
background:#111;
padding:20px;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.price{
margin-top:10px;
font-weight:bold;
}

select{
margin-top:10px;
padding:8px;
width:100%;
}

button{
margin-top:15px;
padding:12px 30px;
border:none;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/ BRAND /

.brand{
padding:120px 20px;
text-align:center;
background:#050505;
}

.brand h2{
font-size:36px;
letter-spacing:6px;
}

.brand p{
margin-top:20px;
opacity:0.7;
}

/ FOOTER /

footer{
padding:40px;
text-align:center;
background:#000;
letter-spacing:3px;
}

/ WHATSAPP BUTTON */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:#fff;
padding:15px 20px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>
