<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C&C Luxury</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
}

/ NAVBAR /

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#000;
z-index:100;
}

nav img{
height:45px;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
letter-spacing:2px;
}

/ HERO /

.hero{
height:100vh;
position:relative;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
}

.overlay h1{
font-size:70px;
letter-spacing:10px;
}

.overlay p{
margin-top:10px;
letter-spacing:4px;
}

/ PRODUCTS /

.products{
padding:150px 50px;
margin-top:50px;
text-align:center;
}

.products h2{
margin-bottom:60px;
letter-spacing:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
}

.card{
background:#111;
padding:20px;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.price{
margin-top:10px;
font-weight:bold;
}

select{
margin-top:10px;
padding:8px;
width:100%;
}

button{
margin-top:10px;
padding:10px 25px;
border:none;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/ CART /

.cart{
position:fixed;
top:90px;
right:20px;
background:#111;
padding:20px;
width:260px;
border:1px solid #333;
}

.cart h3{
margin-bottom:10px;
}

.cart ul{
list-style:none;
font-size:14px;
}

.checkout{
margin-top:10px;
width:100%;
background:#25D366;
color:#fff;
}

/ FOOTER /

footer{
margin-top:100px;
padding:40px;
text-align:center;
letter-spacing:3px;
}

</style>

</head>

<body>

<nav>

<img src="logo.png.png">

<div>
<a href="#">HOME</a>
<a href="#">COLLECTION</a>
</div>

</nav>

<section class="hero">

<video autoplay muted loop>
<source src="Luxury_White_Shirt_Commercial_Production.mp4">
</video>

<div class="overlay">

<h1>C&C</h1>
<p>PURE WHITE — TRUE LUXURY</p>

</div>

</section>

<section class="products">

<h2>WHITE COLLECTION</h2>

<div class="grid">

<div class="card">
<img src="Sample_Product_Assets (1).png">
<div class="price">₹1999</div>

<select id="size1">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('White Shirt',1999,'size1')">Add to Cart</button>

</div>

<div class="card">
<img src="Sample_Product_Assets (2).png">
<div class="price">₹1999</div>

<select id="size2">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('Premium Shirt',1999,'size2')">Add to Cart</button>

</div>

<div class="card">
<img src="Sample_Product_Assets (3).png">
<div class="price">₹1999</div>

<select id="size3">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('Classic Shirt',1999,'size3')">Add to Cart</button>

</div>

<div class="card">
<img src="Sample_Product_Assets (4).png">
<div class="price">₹1999</div>

<select id="size4">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<button onclick="addToCart('Minimal Shirt',1999,'size4')">Add to Cart</button>

</div>

</div>

</section>

<div class="cart">

<h3>Cart</h3>

<ul id="cart-items"></ul>

<p>Total ₹ <span id="total">0</span></p>

<button class="checkout" onclick="payNow()">Pay Now</button>

</div>

<footer>

C&C — PURE WHITE. TRUE LUXURY.

</footer>

<script>

let cart=[]
let total=0

function addToCart(name,price,sizeId){

let size=document.getElementById(sizeId).value

cart.push({name,price,size})

total+=price

updateCart()

}

function updateCart(){

let list=document.getElementById("cart-items")

list.innerHTML=""

cart.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=item.name+" ("+item.size+") - ₹"+item.price+" <button onclick='removeItem("+index+")'>X</button>"

list.appendChild(li)

})

document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].price

cart.splice(i,1)

updateCart()

}

function payNow(){

var options={
"key":"rzp_test_123456789",
"amount":total100,
"currency":"INR",
"name":"C&C Luxury",
"description":"Order Payment",
"handler":function(response){

alert("Payment Successful!")

}

}

var rzp=new Razorpay(options)
