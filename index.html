<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C CLASS CLASSIC | Pure White</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Apple Style Glassmorphism Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-bottom: 0.5px solid #333;
        }

        .logo-img { height: 40px; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: -2px;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.5rem;
            color: #86868b;
            margin-top: 10px;
        }

        /* Product Section */
        .product-section {
            padding: 100px 5%;
            display: flex;
            flex-direction: column;
            gap: 150px;
        }

        .product-row {
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .product-row.reverse { flex-direction: row-reverse; }

        .product-info {
            max-width: 400px;
            padding: 20px;
        }

        .product-info h2 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .product-info p {
            color: #86868b;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .image-container {
            flex: 1;
            max-width: 600px;
            text-align: center;
        }

        /* Image Zoom Animation on Hover */
        .product-img {
            width: 80%;
            border-radius: 20px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-img:hover {
            transform: scale(1.05);
        }

        /* Buy Button - Apple Style */
        .cta-btn {
            background: #0071e3;
            color: white;
            padding: 12px 25px;
            border-radius: 980px;
            text-decoration: none;
            font-weight: 500;
            font-size: 17px;
            transition: 0.3s;
        }

        .cta-btn:hover { background: #0077ed; opacity: 0.9; }

        footer {
            padding: 100px 20px;
            text-align: center;
            color: #424245;
            font-size: 12px;
            border-top: 0.5px solid #333;
        }
    </style>
</head>
<body>

    <nav>
        <img src="logo.png" alt="C&C" class="logo-img">
    </nav>

    <section class="hero" data-aos="fade-up" data-aos-duration="1500">
        <h1>Pure White.</h1>
        <p>Pure Class.</p>
    </section>

    <div class="product-section">
        <div class="product-row">
            <div class="image-container" data-aos="fade-right" data-aos-duration="1200">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000" class="product-img" alt="Premium White Shirt">
            </div>
            <div class="product-info" data-aos="fade-left" data-aos-duration="1200">
                <h2>The Classic Shirt.</h2>
                <p>Meticulously crafted with premium cotton for a sharp, tailored look that never fades.</p>
                <a href="https://wa.me/91XXXXXXXXXX?text=Order: Classic White Shirt" class="cta-btn">Buy Now</a>
            </div>
        </div>

        <div class="product-row reverse">
            <div class="image-container" data-aos="fade-left" data-aos-duration="1200">
                <img src="https://images.unsplash.com/photo-1586363104862-3a5e2ab60d99?q=80&w=1000" class="product-img" alt="White Polo T-shirt">
            </div>
            <div class="product-info" data-aos="fade-right" data-aos-duration="1200">
                <h2>The Signature Polo.</h2>
                <p>The perfect balance between casual comfort and sophisticated style.</p>
                <a href="https://wa.me/91XXXXXXXXXX?text=Order: Signature White Polo" class="cta-btn">Buy Now</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 C&C CLASS CLASSIC | ROHTAK, HARYANA
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: false, // Scroll up-down karne pe animation baar baar hogi
            mirror: true
        });
    </script>
</body>
</html>
