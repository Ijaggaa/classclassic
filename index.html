<!DOCTYPE html>
<html>

<head>
<title>C&C | Class Classic</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,Arial;
}

body{
background:white;
color:#111;
}

/* HEADER */

header{
text-align:center;
padding:50px;
animation:fade 2s;
}

header img{
height:170px;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:70px;
letter-spacing:6px;
}

.hero p{
margin-top:20px;
font-size:18px;
color:#555;
}

/* SECTION */

.section{
padding:100px 10%;
text-align:center;
}

.section h2{
font-size:38px;
margin-bottom:70px;
}

/* PRODUCTS */

.products{
display:flex;
justify-content:center;
gap:120px;
flex-wrap:wrap;
}

/* CARD */

.card{
width:420px;
transition:0.4s;
animation:fadeUp 1.5s;
}

.card:hover{
transform:translateY(-12px);
}

/* IMAGE BOX */

.image-box{
position:relative;
overflow:hidden;
}

.image-box img{
width:100%;
transition:1s;
}

.image-box:hover img{
transform:scale(1.05);
}

/* CHEST LOGO */

.chest-logo{
position:absolute;
top:120px;
left:190px;
width:35px;
}

/* COLLAR LOGO */

.collar-logo{
position:absolute;
top:40px;
left:210px;
width:22px;
}

/* TEXT */

.card h3{
margin-top:25px;
font-size:28px;
}

.price{
font-size:14px;
color:#777;
margin-top:8px;
}

/* BUTTON */

button{
margin-top:25px;
padding:12px 28px;
border:none;
background:black;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#333;
}

/* FOOTER */

footer{
margin-top:120px;
padding:40px;
text-align:center;
background:#111;
color:white;
}

/* ANIMATIONS */

@keyframes fade{
0%{opacity:0}
100%{opacity:1}
}

@keyframes fadeUp{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<header>

<img src="logo.png">

</header>

<div class="hero">

<h1>CLASS CLASSIC</h1>

<p>White clothes mean that you are the color</p>

</div>

<section class="section">

<h2>Luxury White Collection</h2>

<div class="products">


<!-- SHIRT -->

<div class="card">

<div class="image-box">

<img src="https://images.unsplash.com/photo-1598032895397-b9472444bf93">

<img class="chest-logo" src="logo.png">

<img class="collar-logo" src="logo.png">

</div>

<h3>C&C White Shirt</h3>

<p class="price">₹21,999</p>

<button onclick="order()">Buy Now</button>

</div>


<!-- POLO TSHIRT -->

<div class="card">

<div class="image-box">

<img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a">

<img class="chest-logo" src="logo.png">

<img class="collar-logo" src="logo.png">

</div>

<h3>C&C Polo T-Shirt</h3>

<p class="price">₹14,999</p>

<button onclick="order()">Buy Now</button>

</div>

</div>

</section>

<footer>

© 2026 C&C Class Classic

</footer>


<script>

function order(){

window.open("https://wa.me/919813070099?text=Hello I want to order C&C white clothing");

}

</script>

</body>

</html>
