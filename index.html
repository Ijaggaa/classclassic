<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&C CLASS CLASSIC | The White Collection</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Hero Section */
        header {
            text-align: center;
            padding: 80px 20px;
            background-color: #fafafa;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        header p {
            color: #666;
            letter-spacing: 2px;
        }

        /* Product Section */
        .container {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover {
            opacity: 0.8;
        }

        .product-image {
            width: 100%;
            height: 450px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-style: italic;
            color: #999;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .price {
            color: #555;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #1a1a1a;
            color: white;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #444;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid #f0f0f0;
            margin-top: 50px;
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">C&C CLASS CLASSIC</div>
    </nav>

    <header>
        <h1>The White Collection</h1>
        <p>PURE • ESSENTIAL • TIMELESS</p>
    </header>

    <div class="container">
        <div class="product-card">
            <div class="product-image">
                [ Classic White Shirt Image ]
            </div>
            <div class="product-title">Classic Cotton White Shirt</div>
            <div class="price">Premium Quality</div>
            <a href="#" class="btn">VIEW DETAILS</a>
        </div>

        <div class="product-card">
            <div class="product-image">
                [ Signature White Polo Image ]
            </div>
            <div class="product-title">Signature White Polo</div>
            <div class="price">Luxury Comfort</div>
            <a href="#" class="btn">VIEW DETAILS</a>
        </div>
    </div>

    <footer>
        &copy; 2026 C&C CLASS CLASSIC. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
