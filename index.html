<!DOCTYPE html>

<script>

let cart=[]
let total=0

function addToCart(name,price,sizeId){

let size=document.getElementById(sizeId).value

cart.push({name,price,size})

total+=price

updateCart()

}

function updateCart(){

let list=document.getElementById("cart-items")

list.innerHTML=""

cart.forEach((item,index)=>{

let li=document.createElement("li")

li.innerHTML=item.name+" ("+item.size+") - ₹"+item.price+" <button onclick='removeItem("+index+")'>X</button>"

list.appendChild(li)

})

document.getElementById("total").innerText=total

}

function removeItem(i){

total-=cart[i].price
cart.splice(i,1)

updateCart()

}

/ CUSTOMER DETAILS /

let customerName=""
let customerPhone=""
let customerAddress=""

function collectDetails(){

customerName=prompt("Enter your name")
customerPhone=prompt("Enter your phone")
customerAddress=prompt("Enter your address")

payNow()

}

/ PAYMENT /

function payNow(){

var options={

"key":"rzp_test_123456789",

"amount":total100,

"currency":"INR",

"name":"C&C Luxury",

"description":"White Shirt Order",

"handler":function(response){

alert("Payment Successful!")

sendWhatsapp()

},

"prefill":{

"name":customerName,
"contact":customerPhone

}

}

var rzp=new Razorpay(options)

rzp.open()

}

/* WHATSAPP ORDER */

function sendWhatsapp(){

let order="C&C Order%0A"

cart.forEach(item=>{

order+=item.name+" "+item.size+" ₹"+item.price+"%0A"

})

order+="Total ₹"+total+"%0A"

order+="Name: "+customerName+"%0A"

order+="Phone: "+customerPhone+"%0A"

order+="Address: "+customerAddress

window.open("https://wa.me/919813070099
