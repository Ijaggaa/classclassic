<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>C&C Luxury</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
z-index:100;
}

nav img{
height:45px;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
font-size:14px;
letter-spacing:2px;
transition:0.3s;
}

nav a:hover{
opacity:0.6;
}

/* HERO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.overlay h1{
font-size:70px;
letter-spacing:10px;
margin-bottom:20px;
}

.overlay p{
letter-spacing:4px;
opacity:0.8;
}

/* PRODUCTS */

.products{
padding:120px 60px;
text-align:center;
background:#000;
}

.products h2{
font-size:28px;
letter-spacing:6px;
margin-bottom:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
}

.card{
background:#111;
padding:20px;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card button{
margin-top:15px;
padding:12px 30px;
border:none;
background:white;
color:black;
cursor:pointer;
font-weight:bold;
letter-spacing:2px;
}

/* BANNER TEXT */

.banner{
padding:120px 20px;
text-align:center;
background:#050505;
}

.banner h2{
font-size:36px;
letter-spacing:6px;
}

.banner p{
margin-top:20px;
letter-spacing:2px;
opacity:0.7;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
background:#000;
letter-spacing:3px;
font-size:14px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>

<img src="logo.png.png">

<div>
<a href="#">HOME</a>
<a href="#">COLLECTION</a>
<a href="#">ABOUT</a>
</div>

</nav>

<!-- HERO VIDEO -->

<section class="hero">

<video autoplay muted loop>
<source src="Luxury_White_Shirt_Commercial_Production.mp4" type="video/mp4">
</video>

<div class="overlay">

<h1>C&C</h1>
<p>PURE WHITE — TRUE LUXURY</p>

</div>

</section>

<!-- PRODUCTS -->

<section class="products">

<h2>WHITE COLLECTION</h2>

<div class="grid">

<div class="card">
<img src="Sample_Product_Assets (1).png">
<button>BUY NOW</button>
</div>

<div class="card">
<img src="Sample_Product_Assets (2).png">
<button>BUY NOW</button>
</div>

<div class="card">
<img src="Sample_Product_Assets (3).png">
<button>BUY NOW</button>
</div>

<div class="card">
<img src="Sample_Product_Assets (4).png">
<button>BUY NOW</button>
</div>

</div>

</section>

<!-- BRAND MESSAGE -->

<section class="banner">

<h2>CLARITY AMIDST THE NOISE</h2>

<p>Minimal Design. Maximum Presence.</p>

</section>

<!-- FOOTER -->

<footer>

C&C — PURE WHITE. TRUE LUXURY.

</footer>

</body>

</html>
